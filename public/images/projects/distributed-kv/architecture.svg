<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="Distributed key-value store architecture diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:15px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11.5px}
    .lbl{fill:#34d399;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(52,211,153,.12);stroke:rgba(52,211,153,.55);stroke-width:1}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="40" class="lbl">DISTRIBUTED KV · PAXOS CONSENSUS</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M150 205 H222"/>
    <path d="M150 205 H222"/>
  </g>
  <text x="186" y="196" fill="#9aa0b4" font-size="11" text-anchor="middle" style="font-family:Inter,sans-serif">gRPC</text>

  <g><rect class="n" x="30" y="176" width="120" height="58" rx="14"/><text class="t" x="90" y="200" text-anchor="middle">Client</text><text class="s" x="90" y="218" text-anchor="middle">get / put</text></g>

  <rect x="222" y="64" width="372" height="316" rx="18" fill="none" stroke="rgba(52,211,153,.32)" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="234" y="56" fill="#34d399" font-size="11" font-weight="600" letter-spacing=".1em" style="font-family:Inter,sans-serif">REPLICATED CLUSTER · DOCKER</text>

  <g><rect class="a" x="250" y="92" width="184" height="62" rx="13"/><text class="t" x="342" y="116" text-anchor="middle">Node A · Leader</text><text class="s" x="342" y="134" text-anchor="middle">proposer</text></g>
  <g><rect class="n" x="250" y="182" width="184" height="62" rx="13"/><text class="t" x="342" y="206" text-anchor="middle">Node B</text><text class="s" x="342" y="224" text-anchor="middle">acceptor</text></g>
  <g><rect class="n" x="250" y="272" width="184" height="62" rx="13"/><text class="t" x="342" y="296" text-anchor="middle">Node C</text><text class="s" x="342" y="314" text-anchor="middle">acceptor</text></g>

  <g stroke="#34d399" stroke-width="1.3" fill="none" stroke-dasharray="4 4" opacity=".7">
    <path d="M450 123 q70 90 0 180"/>
    <path d="M450 213 H470"/>
  </g>
  <text x="500" y="208" fill="#34d399" font-size="11" text-anchor="middle" style="font-family:Inter,sans-serif">Paxos</text>
  <text x="500" y="224" fill="#9aa0b4" font-size="10.5" text-anchor="middle" style="font-family:Inter,sans-serif">replication</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M594 205 H646"/>
  </g>
  <g><rect class="n" x="646" y="176" width="146" height="58" rx="14"/><text class="t" x="719" y="200" text-anchor="middle">Redis</text><text class="s" x="719" y="218" text-anchor="middle">hot reads</text></g>
</svg>
