<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="Cloud-native AWS infrastructure diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:14px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11px}
    .lbl{fill:#22d3ee;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(34,211,238,.12);stroke:rgba(34,211,238,.5);stroke-width:1}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="40" class="lbl">CLOUD-NATIVE · IaC + CI/CD</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M146 200 H176"/>
    <path d="M312 200 H342"/>
    <path d="M478 200 H548"/>
  </g>
  <text x="513" y="191" fill="#9aa0b4" font-size="10.5" text-anchor="middle" style="font-family:Inter,sans-serif">provisions</text>

  <g><rect class="n" x="28" y="172" width="118" height="56" rx="13"/><text class="t" x="87" y="196" text-anchor="middle">Developer</text><text class="s" x="87" y="213" text-anchor="middle">git push</text></g>
  <g><rect class="n" x="176" y="168" width="136" height="64" rx="13"/><text class="t" x="244" y="194" text-anchor="middle">GitHub Actions</text><text class="s" x="244" y="212" text-anchor="middle">test · build · deploy</text></g>
  <g><rect class="a" x="342" y="168" width="136" height="64" rx="13"/><text class="t" x="410" y="194" text-anchor="middle">Terraform</text><text class="s" x="410" y="212" text-anchor="middle">VPC · subnets · IaC</text></g>

  <rect x="548" y="56" width="248" height="330" rx="18" fill="none" stroke="rgba(34,211,238,.32)" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="560" y="48" fill="#22d3ee" font-size="11" font-weight="600" letter-spacing=".1em" style="font-family:Inter,sans-serif">AWS VPC</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M672 116 V146"/>
    <path d="M672 210 V240"/>
  </g>

  <g><rect class="n" x="572" y="64" width="200" height="52" rx="12"/><text class="t" x="672" y="86" text-anchor="middle">Route 53 + ALB</text><text class="s" x="672" y="103" text-anchor="middle">DNS · load balancer</text></g>
  <g><rect class="a" x="572" y="146" width="200" height="64" rx="12"/><text class="t" x="672" y="172" text-anchor="middle">Auto Scaling Group</text><text class="s" x="672" y="190" text-anchor="middle">EC2 · auto-healing</text></g>
  <g><rect class="n" x="572" y="240" width="200" height="52" rx="12"/><text class="t" x="672" y="262" text-anchor="middle">S3</text><text class="s" x="672" y="279" text-anchor="middle">object storage</text></g>
  <g><rect class="n" x="572" y="312" width="200" height="52" rx="12"/><text class="t" x="672" y="334" text-anchor="middle">CloudWatch</text><text class="s" x="672" y="351" text-anchor="middle">metrics · logs</text></g>
</svg>
