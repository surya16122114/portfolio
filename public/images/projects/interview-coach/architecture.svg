<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="InterviewCoach AI architecture diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:14px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11px}
    .lbl{fill:#e879f9;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(232,121,249,.12);stroke:rgba(232,121,249,.5);stroke-width:1}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="40" class="lbl">INTERVIEWCOACH AI · REAL-TIME AGENT</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M150 224 H186"/>
    <path d="M340 224 H376"/>
    <path d="M550 210 H586 V101 H606"/>
    <path d="M550 224 H606"/>
    <path d="M550 238 H586 V289 H606"/>
  </g>

  <g><rect class="n" x="30" y="196" width="120" height="56" rx="14"/><text class="t" x="90" y="220" text-anchor="middle">Candidate</text><text class="s" x="90" y="238" text-anchor="middle">mock interview</text></g>
  <g><rect class="n" x="186" y="190" width="154" height="68" rx="14"/><text class="t" x="263" y="219" text-anchor="middle">React UI</text><text class="s" x="263" y="237" text-anchor="middle">voice · chat</text></g>
  <g><rect class="a" x="376" y="190" width="174" height="68" rx="14"/><text class="t" x="463" y="215" text-anchor="middle">FastAPI agent</text><text class="s" x="463" y="233" text-anchor="middle">prompt orchestration</text></g>

  <rect x="592" y="52" width="204" height="330" rx="18" fill="none" stroke="rgba(232,121,249,.3)" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="604" y="44" fill="#e879f9" font-size="11" font-weight="600" letter-spacing=".08em" style="font-family:Inter,sans-serif">LLM SERVICES + EVAL</text>

  <g><rect class="a" x="606" y="72" width="180" height="58" rx="13"/><text class="t" x="696" y="96" text-anchor="middle">Gemini Live API</text><text class="s" x="696" y="114" text-anchor="middle">real-time convo</text></g>
  <g><rect class="n" x="606" y="166" width="180" height="58" rx="13"/><text class="t" x="696" y="190" text-anchor="middle">Vertex AI</text><text class="s" x="696" y="208" text-anchor="middle">LLM reasoning</text></g>
  <g><rect class="n" x="606" y="260" width="180" height="58" rx="13"/><text class="t" x="696" y="284" text-anchor="middle">Guardrails · eval</text><text class="s" x="696" y="302" text-anchor="middle">scoring metrics</text></g>
