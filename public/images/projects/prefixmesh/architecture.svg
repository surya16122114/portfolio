<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="PrefixMesh architecture diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:14px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11px}
    .lbl{fill:#22d3ee;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(34,211,238,.12);stroke:rgba(34,211,238,.5);stroke-width:1}
    .e{fill:none;stroke:#7c8194;stroke-width:1.4}
    .ed{fill:none;stroke:#7c8194;stroke-width:1.2;stroke-dasharray:4 5}
    .cap{fill:#7c8194;font-size:10px}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="34" class="lbl">PREFIXMESH · DISTRIBUTED PREFIX-CACHE MESH</text>

  <text x="30" y="66" class="lbl" fill="#9aa0b4">DATA PLANE — SYNCHRONOUS HOT PATH · gRPC</text>
  <rect x="30" y="80" width="210" height="62" rx="10" class="n"/>
  <text x="135" y="106" text-anchor="middle" class="t">Inference clients</text>
  <text x="135" y="126" text-anchor="middle" class="s">vLLM · SGLang fleet</text>

  <rect x="305" y="80" width="210" height="62" rx="10" class="a"/>
  <text x="410" y="106" text-anchor="middle" class="t">Gateways · stateless</text>
  <text x="410" y="126" text-anchor="middle" class="s">consistent-hash ring · content-addressed</text>

  <rect x="580" y="80" width="210" height="62" rx="10" class="n"/>
  <text x="685" y="106" text-anchor="middle" class="t">Cache nodes ×4 · RF=2</text>
  <text x="685" y="126" text-anchor="middle" class="s">paged arena · cost-aware eviction</text>

  <line x1="240" y1="111" x2="305" y2="111" class="e" marker-end="url(#ar)"/>
  <text x="272" y="102" text-anchor="middle" class="cap">get / put</text>
  <line x1="515" y1="111" x2="580" y2="111" class="e" marker-end="url(#ar)"/>
  <text x="547" y="102" text-anchor="middle" class="cap">block ID</text>

  <text x="30" y="248" class="lbl" fill="#9aa0b4">CONTROL PLANE · PAXOS</text>
  <rect x="30" y="262" width="250" height="62" rx="10" class="n"/>
  <text x="155" y="288" text-anchor="middle" class="t">Directory ×3 · multi-decree Paxos</text>
  <text x="155" y="308" text-anchor="middle" class="s">membership · epoch rings · rebalance leases</text>

  <path d="M230 262 C280 210 330 175 395 144" class="ed" marker-end="url(#ar)"/>
  <text x="255" y="196" class="cap">epoch-numbered rings</text>

  <text x="430" y="248" class="lbl" fill="#9aa0b4">EVENT PLANE · KAFKA — OFF THE HOT PATH</text>
  <rect x="430" y="262" width="165" height="62" rx="10" class="n"/>
  <text x="512" y="288" text-anchor="middle" class="t">Kafka topics</text>
  <text x="512" y="308" text-anchor="middle" class="s">access telemetry</text>

  <rect x="640" y="262" width="150" height="62" rx="10" class="a"/>
  <text x="715" y="288" text-anchor="middle" class="t">Prefetcher</text>
  <text x="715" y="308" text-anchor="middle" class="s">predictive warming</text>

  <line x1="595" y1="293" x2="640" y2="293" class="e" marker-end="url(#ar)"/>
  <path d="M700 262 C695 220 690 180 687 146" class="ed" marker-end="url(#ar)"/>
  <text x="704" y="205" class="cap">warm ahead of demand</text>

  <rect x="30" y="368" width="760" height="38" rx="10" class="n"/>
  <text x="410" y="392" text-anchor="middle" class="s">invariant: every failure mode is a cache miss — never a wrong answer · observability: Prometheus + Grafana · measured via self-verifying `make bench`</text>
</svg>
