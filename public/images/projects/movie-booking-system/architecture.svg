<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="Popcorn Pal movie booking architecture diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:15px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11.5px}
    .lbl{fill:#fbbf24;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(251,191,36,.12);stroke:rgba(251,191,36,.5);stroke-width:1}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="40" class="lbl">POPCORN PAL · LAYERED + RBAC</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M188 205 H236"/>
    <path d="M236 205 H236"/>
    <path d="M404 205 H452"/>
    <path d="M620 205 H668"/>
  </g>
  <text x="328" y="196" fill="#9aa0b4" font-size="10.5" text-anchor="middle" style="font-family:Inter,sans-serif">JWT · REST</text>

  <g><rect class="n" x="30" y="150" width="158" height="48" rx="12"/><text class="t" x="109" y="179" text-anchor="middle">User · Admin · Owner</text></g>
  <g><rect class="n" x="30" y="206" width="158" height="58" rx="13"/><text class="t" x="109" y="230" text-anchor="middle">React UI</text><text class="s" x="109" y="248" text-anchor="middle">browse · book seats</text></g>

  <g><rect class="a" x="236" y="171" width="168" height="68" rx="14"/><text class="t" x="320" y="200" text-anchor="middle">Spring Boot API</text><text class="s" x="320" y="219" text-anchor="middle">auth · RBAC</text></g>

  <g><rect class="n" x="452" y="160" width="168" height="90" rx="14"/><text class="t" x="536" y="186" text-anchor="middle">Service layer</text><text class="s" x="536" y="206" text-anchor="middle">Repository · Factory</text><text class="s" x="536" y="223" text-anchor="middle">Singleton · SOLID</text></g>

  <g><rect class="n" x="668" y="171" width="124" height="68" rx="14"/><text class="t" x="730" y="200" text-anchor="middle">MySQL</text><text class="s" x="730" y="219" text-anchor="middle">normalized schema</text></g>
</svg>
