<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="ContextPack architecture diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:14px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11px}
    .lbl{fill:#22d3ee;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(34,211,238,.12);stroke:rgba(34,211,238,.5);stroke-width:1}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="42" class="lbl">CONTEXTPACK · NEGOTIATED CODEBOOK COMPRESSION</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M170 126 H214"/>
    <path d="M402 126 H600"/>
    <path d="M308 162 V196"/>
  </g>
  <text x="500" y="117" fill="#9aa0b4" font-size="10.5" text-anchor="middle" style="font-family:Inter,sans-serif">compressed prompt</text>

  <g><rect class="n" x="30" y="96" width="140" height="60" rx="14"/><text class="t" x="100" y="120" text-anchor="middle">Any LLM client</text><text class="s" x="100" y="138" text-anchor="middle">SDK · Cursor · LangChain</text></g>
  <g><rect class="a" x="214" y="90" width="188" height="72" rx="15"/><text class="t" x="308" y="119" text-anchor="middle">ContextPack proxy</text><text class="s" x="308" y="137" text-anchor="middle">OpenAI-compatible · :8000</text></g>
  <g><rect class="n" x="600" y="96" width="196" height="60" rx="14"/><text class="t" x="698" y="120" text-anchor="middle">Upstream LLM</text><text class="s" x="698" y="138" text-anchor="middle">OpenAI · Anthropic · BYOK</text></g>

  <rect x="214" y="196" width="582" height="190" rx="18" fill="none" stroke="rgba(34,211,238,.3)" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="226" y="188" class="lbl">COMPRESSION ENGINE</text>

  <g><rect class="a" x="230" y="220" width="262" height="64" rx="13"/><text class="t" x="361" y="248" text-anchor="middle">Negotiated codebook</text><text class="s" x="361" y="266" text-anchor="middle">lossless · model-confirmed</text></g>
  <g><rect class="n" x="510" y="220" width="268" height="64" rx="13"/><text class="t" x="644" y="248" text-anchor="middle">Content-aware compressors</text><text class="s" x="644" y="266" text-anchor="middle">JSON · code · logs · prose</text></g>
  <g><rect class="n" x="230" y="302" width="262" height="62" rx="13"/><text class="t" x="361" y="329" text-anchor="middle">Token budget + dedup</text><text class="s" x="361" y="347" text-anchor="middle">fit budget · drop near-dupes</text></g>
  <g><rect class="n" x="510" y="302" width="268" height="62" rx="13"/><text class="t" x="644" y="329" text-anchor="middle">Lazy references</text><text class="s" x="644" y="347" text-anchor="middle">fetch big blobs on demand</text></g>
</svg>
