<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="EduRAG architecture diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:14px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11px}
    .lbl{fill:#a78bfa;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(167,139,250,.12);stroke:rgba(167,139,250,.5);stroke-width:1}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="40" class="lbl">EDURAG · RAG + MIXTURE-OF-EXPERTS</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M166 224 H206"/>
    <path d="M360 224 H396"/>
    <path d="M550 210 H586 V101 H610"/>
    <path d="M550 224 H610"/>
    <path d="M550 238 H586 V289 H610"/>
    <path d="M130 124 V160 a8 8 0 0 0 8 8 H467 q8 0 8 8 V186"/>
  </g>
  <text x="300" y="150" fill="#a78bfa" font-size="10.5" text-anchor="middle" style="font-family:Inter,sans-serif">SSO · grade sync</text>

  <g><rect class="n" x="30" y="66" width="200" height="58" rx="14"/><text class="t" x="130" y="90" text-anchor="middle">Canvas LMS</text><text class="s" x="130" y="108" text-anchor="middle">LTI 1.3 · OIDC SSO</text></g>
  <g><rect class="n" x="46" y="196" width="120" height="56" rx="14"/><text class="t" x="106" y="220" text-anchor="middle">Student</text><text class="s" x="106" y="238" text-anchor="middle">queries</text></g>
  <g><rect class="n" x="210" y="190" width="150" height="68" rx="14"/><text class="t" x="285" y="219" text-anchor="middle">React UI</text><text class="s" x="285" y="237" text-anchor="middle">learning app</text></g>
  <g><rect class="a" x="400" y="190" width="150" height="68" rx="14"/><text class="t" x="475" y="219" text-anchor="middle">FastAPI</text><text class="s" x="475" y="237" text-anchor="middle">RAG backend</text></g>

  <rect x="596" y="52" width="200" height="330" rx="18" fill="none" stroke="rgba(167,139,250,.32)" stroke-width="1" stroke-dasharray="5 5"/>
  <text x="608" y="44" fill="#a78bfa" font-size="11" font-weight="600" letter-spacing=".08em" style="font-family:Inter,sans-serif">RAG + MoE INFERENCE</text>

  <g><rect class="a" x="614" y="72" width="164" height="58" rx="13"/><text class="t" x="696" y="96" text-anchor="middle">MoE router</text><text class="s" x="696" y="114" text-anchor="middle">specialist modes</text></g>
  <g><rect class="n" x="614" y="166" width="164" height="58" rx="13"/><text class="t" x="696" y="190" text-anchor="middle">GPT-4o-mini</text><text class="s" x="696" y="208" text-anchor="middle">inference</text></g>
  <g><rect class="n" x="614" y="260" width="164" height="58" rx="13"/><text class="t" x="696" y="284" text-anchor="middle">Vector store</text><text class="s" x="696" y="302" text-anchor="middle">textbook sources</text></g>
