<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" width="820" height="430" role="img" aria-label="Roomies Radar architecture diagram">
  <style>
    text{font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif}
    .t{fill:#e8e9f0;font-size:15px;font-weight:600}
    .s{fill:#9aa0b4;font-size:11.5px}
    .lbl{fill:#f472b6;font-size:11px;font-weight:600;letter-spacing:.12em}
    .n{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.13);stroke-width:1}
    .a{fill:rgba(244,114,182,.12);stroke:rgba(244,114,182,.5);stroke-width:1}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c8194" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="40" class="lbl">ROOMIES RADAR · REAL-TIME PWA</text>

  <g stroke="#5b6072" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M218 160 H452 q8 0 8 8 V172"/>
    <path d="M218 250 H452 q8 0 8 -8 V214"/>
    <path d="M620 165 H668"/>
    <path d="M620 245 H668"/>
  </g>
  <text x="360" y="150" fill="#9aa0b4" font-size="10.5" text-anchor="middle" style="font-family:Inter,sans-serif">REST</text>
  <text x="360" y="270" fill="#f472b6" font-size="10.5" text-anchor="middle" style="font-family:Inter,sans-serif">WebSocket</text>

  <g><rect class="a" x="30" y="150" width="188" height="68" rx="14"/><text class="t" x="124" y="179" text-anchor="middle">React + TS</text><text class="s" x="124" y="198" text-anchor="middle">Redux store</text></g>
  <g><rect class="n" x="30" y="232" width="188" height="56" rx="13"/><text class="t" x="124" y="256" text-anchor="middle">Service worker</text><text class="s" x="124" y="274" text-anchor="middle">offline · install</text></g>

  <g><rect class="n" x="460" y="146" width="160" height="58" rx="13"/><text class="t" x="540" y="170" text-anchor="middle">Express API</text><text class="s" x="540" y="188" text-anchor="middle">profiles · listings</text></g>
  <g><rect class="a" x="460" y="216" width="160" height="58" rx="13"/><text class="t" x="540" y="240" text-anchor="middle">WS server</text><text class="s" x="540" y="258" text-anchor="middle">live chat</text></g>

  <g><rect class="n" x="668" y="136" width="124" height="58" rx="13"/><text class="t" x="730" y="160" text-anchor="middle">MongoDB</text><text class="s" x="730" y="178" text-anchor="middle">documents</text></g>
  <g><rect class="n" x="668" y="216" width="124" height="58" rx="13"/><text class="t" x="730" y="240" text-anchor="middle">Presence</text><text class="s" x="730" y="258" text-anchor="middle">socket rooms</text></g>
</svg>
